<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>minions</title>
  <meta name="description" content="A simple agentic framework with observability and evals baked in.">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #09090d;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    .main {
      text-align: center;
      padding: 2rem;
      animation: rise 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      width: 240px;
      height: auto;
      display: block;
      margin: 0 auto 2.5rem;
    }

    .tagline {
      font-size: 1rem;
      color: #6b6b80;
      letter-spacing: 0.01em;
      font-weight: 400;
      line-height: 1.6;
      max-width: 360px;
      margin: 0 auto 2.5rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #5B53E8;
      border: 1px solid rgba(91, 83, 232, 0.35);
      background: rgba(91, 83, 232, 0.06);
      padding: 0.45rem 1rem;
      border-radius: 999px;
    }

    .badge::before {
      content: '';
      display: block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #5B53E8;
      opacity: 0.7;
    }

    footer {
      position: fixed;
      bottom: 2rem;
      display: flex;
      gap: 2rem;
      align-items: center;
    }

    footer a {
      color: #3a3a4a;
      text-decoration: none;
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      transition: color 0.2s ease;
    }

    footer a:hover { color: #888; }

    /* GitHub SVG icon */
    footer a svg {
      vertical-align: middle;
      margin-right: 0.35rem;
      opacity: 0.6;
      transition: opacity 0.2s;
    }
    footer a:hover svg { opacity: 1; }
  </style>
</head>
